<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChantGPT — YOUR AI WORLD CUP SONG GENERATOR</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #CC0000;
    --dark-red: #990000;
    --navy: #003087;
    --white: #ffffff;
    --off-white: #f5f3f0;
    --black: #111111;
    --text: #1a1a1a;
    --text-muted: #666;
    --border: #ddd;
    --radius: 4px;
  }

  html, body {
    background: var(--white);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HERO ── */
  .hero {
    background: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 20px 0;
  }

  .logo {
    text-align: center;
    margin-bottom: 16px;
  }

  .logo-img {
    width: min(700px, 92vw);
    display: block;
    margin: 0 auto;
    margin-bottom: -80px;
  }

  .logo .tagline {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--navy);
    margin-top: 0;
    position: relative;
    z-index: 1;
  }

  /* Fan + scarf overlay container */
  .fan-container {
    position: relative;
    width: min(900px, 96vw);
    margin: 0 auto;
    background: #ffffff;
  }

  .fan-img {
    width: 100%;
    display: block;
  }

  /* Prompt overlay — positioned over the scarf */
  .scarf-input {
    position: absolute;
    /* scarf is roughly at 7% from top, height about 11% of image */
    top: 5.5%;
    left: 14%;
    right: 14%;
    z-index: 10;
  }

  .scarf-textarea {
    width: 100%;
    background: #ffffff;
    border: 3px solid var(--navy);
    border-radius: 999px;
    padding: 8px 12px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(12px, 2.5vw, 16px);
    font-weight: 600;
    color: var(--red);
    text-transform: uppercase;
    letter-spacing: 1px;
    outline: none;
    line-height: 1.4;
    text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    height: 44px;
  }

  .scarf-textarea::placeholder {
    color: rgba(204,0,0,0.45);
    font-style: normal;
    text-transform: uppercase;
  }

  .scarf-textarea:focus {
    background: #ffffff;
    border-color: var(--red);
  }

  

  /* Options + button below image */
  .controls {
    width: min(900px, 96vw);
    margin: -60px auto 0;
    position: relative;
    z-index: 20;
  }

  

  

  .gen-btn {
    width: 50%;
    display: block;
    margin: 0 auto;
    padding: 16px;
    background: var(--red);
    color: white;
    border: 2px solid var(--black);
    border-radius: var(--radius);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--black);
    transition: transform 0.1s, box-shadow 0.1s, background 0.15s;
  }

  .gen-btn:hover { background: var(--dark-red); transform: translate(-1px,-1px); box-shadow: 5px 5px 0 var(--black); }
  .gen-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--black); }
  .gen-btn:disabled { background: #aaa; cursor: not-allowed; transform: none; }

  /* Examples */

  /* ── PROGRESS ── */
  .progress-section {
    width: min(900px, 96vw);
    margin: 20px auto 0;
    display: none;
  }

  .card {
    border: 3px solid var(--black);
    border-radius: var(--radius);
    box-shadow: 5px 5px 0 var(--black);
    overflow: hidden;
  }

  .card-header {
    padding: 9px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: white;
    background: var(--navy);
  }

  .card-body { padding: 16px; background: white; }

  .steps { display: flex; flex-direction: column; gap: 10px; }

  .step { display: flex; align-items: center; gap: 12px; font-size: 14px; color: #bbb; transition: color 0.3s; }
  .step.active { color: var(--text); font-weight: 500; }
  .step.done { color: #4caf50; }

  .step-dot {
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid #ddd;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; flex-shrink: 0; transition: all 0.3s;
  }

  .step.active .step-dot { border-color: var(--red); background: var(--red); color: white; animation: pulse 1s infinite; }
  .step.done .step-dot { border-color: #4caf50; background: #4caf50; color: white; }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(204,0,0,0.3); }
    50% { box-shadow: 0 0 0 6px rgba(204,0,0,0); }
  }

  /* ── OUTPUT ── */
  .output-section {
    width: min(900px, 96vw);
    margin: 20px auto 40px;
    display: none;
    animation: slideUp 0.4s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .output-header {
    background: var(--red);
    color: white;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .output-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 2px;
    flex: 1;
  }

  .copy-btn {
    font-size: 12px;
    padding: 5px 12px;
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: var(--radius);
    color: white;
    cursor: pointer;
    font-family: 'Barlow', sans-serif;
    transition: background 0.15s;
  }

  .copy-btn:hover { background: rgba(255,255,255,0.35); }

  .player-section {
    background: var(--off-white);
    padding: 20px;
    border-bottom: 2px solid var(--border);
  }

  audio { width: 100%; border-radius: var(--radius); }

  .download-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    padding: 7px 14px;
    border: 2px solid var(--black);
    border-radius: var(--radius);
    background: white;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 2px 2px 0 var(--black);
    transition: background 0.15s;
  }

  .download-btn:hover { background: var(--off-white); }

  .lyrics-section { padding: 20px; background: white; }

  .lyrics-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .lyrics-box {
    font-size: 14px;
    line-height: 2;
    color: var(--text);
    white-space: pre-wrap;
  }

  .section-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--red);
  }

  .error-box {
    width: min(900px, 96vw);
    margin: 16px auto 0;
    padding: 14px 16px;
    border: 2px solid var(--red);
    border-radius: var(--radius);
    background: #fff5f5;
    font-size: 13px;
    color: var(--red);
    display: none;
    line-height: 1.6;
  }

  .footer {
    background: var(--black);
    color: #555;
    text-align: center;
    padding: 20px;
    font-size: 12px;
    letter-spacing: 1px;
    margin-top: 40px;
  }

  @media (max-width: 480px) {
    .logo h1 { font-size: 56px; }
    .scarf-textarea { font-size: 11px; padding: 6px 8px; }
    .fan-container { width: 96vw; }
    .armpit-left, .armpit-right { width: 22%; }
    .armpit-select { font-size: 10px; padding: 5px 4px; }
  }
</style>
</head>

    <div class="scarf-input">
      <input
        type="text"
        class="scarf-textarea"
        id="prompt"
        placeholder="DESCRIBE YOUR WORLD CUP SONG HERE"
      />
    </div>

  </div>

  <div class="controls">
    <button class="gen-btn" id="genBtn" onclick="generate()">MAKE MY WORLD CUP SONG</button>
  </div></div>

  <div class="progress-section" id="progressSection">
    <div class="card">
      <div class="card-header">🎵 Composing Your Anthem...</div>
      <div class="card-body">
        <div class="steps">
          <div class="step" id="step1"><div class="step-dot">1</div><span>Writing your lyrics</span></div>
          <div class="step" id="step2"><div class="step-dot">2</div><span>Composing the music</span></div>
          <div class="step" id="step3"><div class="step-dot">3</div><span>Recording the vocals</span></div>
          <div class="step" id="step4"><div class="step-dot">4</div><span>Mixing your anthem</span></div>
        </div>
      </div>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="output-section" id="outputSection">
    <div class="card">
      <div class="output-header">
        <span class="output-title" id="songTitle">Your Anthem</span>
        <button class="copy-btn" onclick="copyLyrics()">Copy Lyrics</button>
      </div>
      <div class="player-section">
        <audio id="audioPlayer" controls></audio>
        <br>
        <a class="download-btn" id="downloadBtn" download="chantgpt.mp3">⬇ Download MP3</a>
      </div>
      <div class="lyrics-section">
        <div class="lyrics-label">Lyrics</div>
        <div class="lyrics-box" id="lyricsBox"></div>
      </div>
    </div>
  </div>
</div>

<div class="footer">CHANTGPT · POWERED BY CLAUDE &amp; ELEVENLABS</div>

<script>
  let lyricsText = '';

  const exampleMap = {
    '🏴󠁧󠁢󠁥󠁮󠁧󠁿 England terrace chant': 'A classic English terrace chant for England at the World Cup. Passionate fans, Wembley roar, belief we can bring it home.',
    '🇧🇷 Epic Brazil samba anthem': 'An epic samba anthem for Brazil, full of joy and carnival energy, celebrating the beautiful game and their legendary World Cup history.',
    '🇫🇷 French hip-hop banger': 'A hard-hitting hip-hop banger for the French national team Les Bleus, with Parisian swagger and World Cup hunger.',
    '🇲🇦 Emotional Morocco anthem': 'An emotional, powerful anthem for Morocco, celebrating their historic World Cup run, pride of North Africa and the Arab world.'
  };

  function setExample(el) {
    const key = el.textContent.trim();
    document.getElementById('prompt').value = exampleMap[key] || key;
  }

  function setStep(n) {
    for (let i = 1; i <= 4; i++) {
      const el = document.getElementById('step' + i);
      const dot = el.querySelector('.step-dot');
      if (i < n) { el.className = 'step done'; dot.textContent = '✓'; }
      else if (i === n) { el.className = 'step active'; dot.textContent = i; }
      else { el.className = 'step'; dot.textContent = i; }
    }
  }

  function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
  function escHtml(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  async function generate() {
    const prompt = document.getElementById('prompt').value.trim();
    if (!prompt) { document.getElementById('prompt').focus(); return; }

    const btn   = document.getElementById('genBtn');

    btn.disabled = true;
    btn.textContent = '🎵 COMPOSING...';

    document.getElementById('progressSection').style.display = 'block';
    document.getElementById('outputSection').style.display = 'none';
    document.getElementById('errorBox').style.display = 'none';
    document.getElementById('progressSection').scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    setStep(1);

    try {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Server error');
      if (data.error) throw new Error(data.error);

      setStep(2); await delay(700);
      setStep(3); await delay(700);
      setStep(4); await delay(500);

      lyricsText = data.lyrics;
      document.getElementById('songTitle').textContent = data.title || 'Your Anthem';

      if (data.audioUrl) {
        document.getElementById('audioPlayer').src = data.audioUrl;
        document.getElementById('downloadBtn').href = data.audioUrl;
      }

      if (data.audioError) {
        const eb = document.getElementById('errorBox');
        eb.textContent = 'Audio issue: ' + data.audioError;
        eb.style.display = 'block';
      }

      const rendered = escHtml(data.lyrics)
        .replace(/\[([^\]]+)\]/g, '<span class="section-tag">[]</span>')
        .replace(/\n/g, '<br>');
      document.getElementById('lyricsBox').innerHTML = rendered;

      document.getElementById('progressSection').style.display = 'none';
      document.getElementById('outputSection').style.display = 'block';
      document.getElementById('outputSection').scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    } catch(e) {
      document.getElementById('progressSection').style.display = 'none';
      const eb = document.getElementById('errorBox');
      eb.textContent = 'Something went wrong: ' + e.message;
      eb.style.display = 'block';
    }

    btn.disabled = false;
    btn.textContent = "MAKE MY WORLD CUP SONG";
  }

  function copyLyrics() {
    if (!lyricsText) return;
    navigator.clipboard.writeText(lyricsText).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '✓ Copied!';
      setTimeout(() => btn.textContent = 'Copy Lyrics', 2000);
    });
  }
</script>
</body>
</html>
